name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - run: node --version && npm --version

      - run: npm ci

      - run: npm run build
        env:
          CI: false

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - id: deploy
        uses: actions/deploy-pages@v4
